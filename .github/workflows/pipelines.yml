name: Pipeline CI/CD

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]

jobs:
  # -------------------------
  # CI - roda para PRs
  # -------------------------
  ci:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -e .[streaming,batch,dashboard,dev]

      - name: Lint + Test
        run: |
          black --check .
          ruff check .
          pytest

  # -------------------------
  # Docker Build & Push - roda para PRs
  # -------------------------
  docker-build-push:
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2

      - name: Ensure ECR repo
        run: |
          aws ecr describe-repositories --repository-names smartgoal/real-time-ad-tech || \
          aws ecr create-repository --repository-name smartgoal/real-time-ad-tech

      - name: Build & Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.ECR_REGISTRY }}:${{ github.sha }}

  # -------------------------
  # CD - Deploy via SSH
  # -------------------------
  cd-deploy:
    runs-on: ubuntu-latest
    needs: [ci, docker-build-push]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v0.1.9
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: |
            ${{ secrets.EC2_SSH_KEY }}
          script: |
            chmod +x ~/deploy/deploy.sh
            ~/deploy/deploy.sh ${{ github.sha }} ${GITHUB_REF_NAME}
