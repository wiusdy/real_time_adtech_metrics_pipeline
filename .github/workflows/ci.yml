name: CI - Build & Push Image

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          pip install .[dev]

      - name: Lint + Test
        run: |
          black --check .
          ruff check .
          pytest

  docker-build-push:
    runs-on: ubuntu-latest
    needs: ci

    steps:
      - uses: actions/checkout@v4

      # AWS auth
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2

      # Ensure repo exists
      - name: Ensure ECR repo
        run: |
          aws ecr describe-repositories --repository-names ml-pipeline || \
          aws ecr create-repository --repository-name ml-pipeline

      # Build & Push
      - name: Build & Push Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/ml-pipeline:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
