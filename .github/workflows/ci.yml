name: CI - Build & Push Image

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          pip install -e .[streaming,batch,dashboard,dev]

      - name: Lint + Test
        run: |
          black --check .
          ruff check .
          pytest

  docker-build:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: ci

    steps:
      # -------------------------
      # CHECKOUT
      # -------------------------
      - name: Checkout
        uses: actions/checkout@v4

      # -------------------------
      # LOGIN NO ECR
      # -------------------------
      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2
        with:
          registry: ${{ secrets.ECR_REGISTRY }}
          region: ${{ secrets.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }} # opcional, se usar role

      # -------------------------
      # BUILD E PUSH DA IMAGEM
      # -------------------------
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.ECR_REGISTRY }}/ml-pipeline:${{ github.sha }}
