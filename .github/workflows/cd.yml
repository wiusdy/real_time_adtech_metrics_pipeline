name: CD - Deploy to EC2

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # Checkout do repo
      - name: Checkout
        uses: actions/checkout@v4

      # Deploy via SSH
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v0.1.9
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            chmod +x ~/deploy/deploy.sh
            ~/deploy/deploy.sh ${{ github.sha }} ${{ secrets.ECR_REGISTRY }}
